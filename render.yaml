# 校园百晓生 - Render 部署配置
# 把这个文件放在项目根目录，Render 会自动识别

services:
  - type: web
    name: campus-baixiaosheng
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node src/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
